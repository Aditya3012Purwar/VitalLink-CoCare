# Deploy on Render: https://render.com — New > Blueprint > connect this repo
services:
  - type: web
    name: pads-parkinson-care
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL
        value: eleven_multilingual_v2
      - key: ELEVENLABS_SPEED
        value: "1.18"
